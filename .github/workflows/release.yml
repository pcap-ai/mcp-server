name: Release Build

# Trigger the action ONLY when you push a new tag starting with 'v' (e.g., v1.0.0)
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    # Build matrix: configure the OS, Rust target architecture, and final asset name
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: pcap-ai-mcp
            asset_name: pcap-ai-mcp-linux-amd64

          # Added Linux ARM64 target
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: pcap-ai-mcp
            asset_name: pcap-ai-mcp-linux-arm64

          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: pcap-ai-mcp
            asset_name: pcap-ai-mcp-macos-amd64

          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: pcap-ai-mcp
            asset_name: pcap-ai-mcp-macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: pcap-ai-mcp.exe
            asset_name: pcap-ai-mcp-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install the GCC cross-compiler for ARM64 ONLY when building the ARM64 target
      - name: Install cross-compiler (Linux ARM64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      # Build the binary, passing the custom linker environment variable if needed
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary for release
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.binary_name }} target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.asset_name }}
          draft: true
        env:
          # GitHub generates this token automatically; you do not need to create it manually
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
