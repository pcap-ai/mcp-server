# Smithery Configuration for pcap-ai-mcp
name: pcap-ai-mcp
version: 1.0.0
description: "Professional MCP server for deep packet inspection. Transform Claude and AI agents into autonomous SOC analysts."
author: "Pcap AI Team"
repository: "https://github.com/pcap-ai/mcp-server"
license: "MIT"
keywords: ["mcp", "pcap", "cybersecurity", "wireshark", "threat-hunting"]

# Instructions for the Smithery CLI installer
install:
  methods:
    - type: binary
      platforms:
        - os: macos
          arch: arm64
          url: "https://github.com/pcap-ai/mcp-server/releases/download/v1.0.0/pcap-ai-mcp-macos-arm64"
        - os: macos
          arch: amd64
          url: "https://github.com/pcap-ai/mcp-server/releases/download/v1.0.0/pcap-ai-mcp-macos-amd64"
        - os: linux
          arch: amd64
          url: "https://github.com/pcap-ai/mcp-server/releases/download/v1.0.0/pcap-ai-mcp-linux-amd64"
        - os: linux
          arch: arm64
          url: "https://github.com/pcap-ai/mcp-server/releases/download/v1.0.0/pcap-ai-mcp-linux-arm64"
        - os: windows
          arch: amd64
          url: "https://github.com/pcap-ai/mcp-server/releases/download/v1.0.0/pcap-ai-mcp-windows-amd64.exe"
